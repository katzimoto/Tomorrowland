name: PR Quality Gate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "frontend/**"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Lint/typecheck/test and docs builds are owned by Backend CI
# (.github/workflows/backend.yml) and Docs CI (.github/workflows/docs.yml).
# This workflow only runs the checks that exist nowhere else.
jobs:
  pre-pr-checklist:
    name: Pre-PR cleanliness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run pre-PR checklist
        run: bash scripts/check-pr-cleanliness.sh ${{ github.base_ref }}
