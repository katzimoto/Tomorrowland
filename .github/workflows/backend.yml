name: Backend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "scripts/check-qdrant-compat.py"
      - "docker-compose.yml"
      - "docker-compose.airgap.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
      - "developer/**"
      - "feature/**"
      - "fix/**"
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "scripts/check-qdrant-compat.py"
      - "docker-compose.yml"
      - "docker-compose.airgap.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON_VERSION: "3.13"
  UV_SYSTEM_PYTHON: "1"

jobs:
  dependency-contracts:
    name: Dependency contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Qdrant client/server compatibility
        run: python scripts/check-qdrant-compat.py

  quality:
    name: Ruff, mypy & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/ migrations/

      - name: Ruff format check
        run: ruff format --check src/ tests/ migrations/

      - name: Mypy cache
        uses: actions/cache@v4
        with:
          path: /tmp/.mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('src/**/*.py', 'pyproject.toml') }}
          restore-keys: mypy-${{ runner.os }}-

      - name: Mypy strict type check
        run: mypy src --strict --cache-dir /tmp/.mypy_cache

      - name: Check boolean-integer SQL comparisons
        run: python scripts/check-boolean-int-sql.py

      - name: Unit tests (fast, no services needed)
        run: pytest tests/ -n auto -q --ignore=tests/integration

  tests:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      POSTGRES_URL: postgresql+psycopg://postgres:postgres@localhost:5432/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run migrations against PostgreSQL
        run: alembic upgrade head

      - name: Integration tests (needs PostgreSQL)
        env:
          PGTEST: "1"
        run: pytest tests/integration/ -n auto -q
