name: Docs CI

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
      - "developer/**"
      - "docs/**"
      - "feature/**"
      - "fix/**"
    paths:
      - "**/*.md"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_SYSTEM_PYTHON: "1"

jobs:
  docs:
    name: Required files & markdown headings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required bootstrap files
        run: |
          set -euo pipefail
          test -f docs/logical-spec.md
          test -f docs/index.md
          test -f .github/pull_request_template.md

      - name: Check markdown structure
        run: |
          set -euo pipefail
          find . -name '*.md' \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -not -path './frontend/node_modules/*' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './site/*' \
            -not -path './docs/api/*' \
            -print0 |
            xargs -0 -I {} sh -c 'first="$(head -n 1 "$1")"; test "${first#\#}" != "$first" || test "$first" = "---"' sh {}

  mkdocs:
    name: MkDocs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Build docs (strict)
        run: mkdocs build --strict
