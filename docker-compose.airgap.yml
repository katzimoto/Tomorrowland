# Air-gapped deployment overlay for Tomorrowland.
#
# Layer on top of docker-compose.yml for offline operation:
#   docker compose -f docker-compose.yml -f docker-compose.airgap.yml [command]
#
# All runtime differences between connected and air-gapped deployments are
# controlled by .env.airgap.example variables (BIND_HOST, MEILISEARCH_ENV,
# TOMORROWLAND_*_IMAGE, OLLAMA_URL, EMBEDDING_URL, etc.). This file adds
# pull_policy: never to every service so Docker never attempts a registry pull
# in an offline environment — a missing image fails fast with a clear error
# instead of timing out on a blocked network.
#
# To start with bundled Ollama (models loaded via load-ollama-model-bundle.sh):
#   COMPOSE_PROFILES=local-llm docker compose -f docker-compose.yml -f docker-compose.airgap.yml up -d
# Or use the wrapper which activates the profile automatically:
#   scripts/tomorrowland-airgap.sh up

services:
  migrate:
    pull_policy: never
  api:
    pull_policy: never
  mcp-server:
    pull_policy: never
  frontend:
    pull_policy: never
  parse-worker:
    pull_policy: never
  translate-worker:
    pull_policy: never
  embed-worker:
    pull_policy: never
  index-worker:
    pull_policy: never
  intelligence-worker:
    pull_policy: never
  alert-worker:
    pull_policy: never
  enrich-worker:
    pull_policy: never
  postgres:
    pull_policy: never
  kafka:
    pull_policy: never
  meilisearch:
    pull_policy: never
  qdrant:
    pull_policy: never
  libretranslate:
    pull_policy: never
  ollama-llm:
    pull_policy: never
  ollama-embed:
    pull_policy: never
  rabbitmq:
    pull_policy: never
  redis:
    pull_policy: never
