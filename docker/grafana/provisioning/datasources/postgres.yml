apiVersion: 1

datasources:
  - name: Tomorrowland Postgres
    type: postgres
    uid: tomorrowland-postgres
    access: proxy
    url: ${POSTGRES_HOST}:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: false
    editable: false
