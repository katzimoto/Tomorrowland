server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers from this compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        action: keep
        regex: .+
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      # Worker services emit JSON: {"level": "INFO", "correlation_id": "...", "message": "..."}
      # API service emits plain text: "2024-01-01 12:00:00 INFO [name] msg correlation_id=..."
      # Parse JSON to extract level label (low cardinality — safe as label)
      - json:
          expressions:
            level: level
      # Regex fallback: extract level from API plain-text logs
      - regex:
          expression: '^\S+ (?P<level_text>DEBUG|INFO|WARNING|ERROR|CRITICAL)\s'
      - template:
          source: level
          template: '{{ if .Value }}{{ .Value }}{{ else }}{{ .level_text }}{{ end }}'
      - labels:
          level:
          service:
