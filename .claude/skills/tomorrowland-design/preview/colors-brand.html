<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: 220px 1fr 1fr; gap: 12px; }
  .sw { border-radius: var(--radius-panel); height: 130px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--color-border); }
  .name { font-size: 13px; font-weight: 600; }
  .tok { font-family: var(--font-family-mono); font-size: 11px; opacity: 0.85; }
  .hex { font-family: var(--font-family-mono); font-size: 11px; opacity: 0.85; }
  .glow { background: #060c1a; color: #00e5ff; box-shadow: inset 0 0 0 1px rgba(0,229,255,0.18); }
  .glow .name { text-shadow: 0 0 12px rgba(0, 229, 255, 0.6); }
  .navy { background: #060c1a; color: #cfd6e4; }
  .grid-bg { background:
    linear-gradient(#0d2a44 1px, transparent 1px) 0 0/40px 40px,
    linear-gradient(90deg, #0d2a44 1px, transparent 1px) 0 0/40px 40px,
    #060c1a;
    color: #00e5ff;
  }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="sw glow">
      <div class="name">Cyber cyan</div>
      <div>
        <div class="tok">--tl-cyber-cyan</div>
        <div class="hex">#00e5ff &nbsp;·&nbsp; LOGO ONLY</div>
      </div>
    </div>
    <div class="sw navy">
      <div class="name">Deep navy</div>
      <div><div class="tok">--tl-cyber-bg</div><div class="hex">#060c1a</div></div>
    </div>
    <div class="sw grid-bg">
      <div class="name" style="color: #cfd6e4;">Grid line</div>
      <div><div class="tok">--tl-cyber-grid</div><div class="hex">#0d2a44</div></div>
    </div>
  </div>
</div>
</body></html>
