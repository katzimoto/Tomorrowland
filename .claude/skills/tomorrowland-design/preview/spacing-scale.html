<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 60px 60px 1fr; align-items: center; gap: 18px; padding: 6px 0; }
  .tok { font-family: var(--font-family-mono); font-size: 12px; color: var(--color-text-secondary); }
  .px { font-family: var(--font-family-mono); font-size: 12px; color: var(--color-text-muted); text-align: right; }
  .bar { background: var(--color-primary); height: 12px; border-radius: 2px; }
</style></head>
<body>
<div class="card stack">
  <div class="row"><div class="tok">--space-1</div><div class="px">4 px</div><div class="bar" style="width: 4px;"></div></div>
  <div class="row"><div class="tok">--space-2</div><div class="px">8 px</div><div class="bar" style="width: 8px;"></div></div>
  <div class="row"><div class="tok">--space-3</div><div class="px">12 px</div><div class="bar" style="width: 12px;"></div></div>
  <div class="row"><div class="tok">--space-4</div><div class="px">16 px</div><div class="bar" style="width: 16px;"></div></div>
  <div class="row"><div class="tok">--space-5</div><div class="px">20 px</div><div class="bar" style="width: 20px;"></div></div>
  <div class="row"><div class="tok">--space-6</div><div class="px">24 px</div><div class="bar" style="width: 24px;"></div></div>
  <div class="row"><div class="tok">--space-8</div><div class="px">32 px</div><div class="bar" style="width: 32px;"></div></div>
  <div class="row"><div class="tok">--space-10</div><div class="px">40 px</div><div class="bar" style="width: 40px;"></div></div>
  <div class="row"><div class="tok">--space-14</div><div class="px">56 px</div><div class="bar" style="width: 56px;"></div></div>
</div>
</body></html>
