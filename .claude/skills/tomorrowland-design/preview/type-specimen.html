<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Type specimen</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .display { font-size: 56px; line-height: 60px; font-weight: 600; letter-spacing: -0.02em; color: var(--color-text-primary); }
  .display .cyan { color: var(--tl-cyber-cyan); }
  .meta-row { display: flex; gap: 24px; font-size: var(--font-size-meta); color: var(--color-text-muted); font-family: var(--font-family-mono); }
  .body { font-size: var(--font-size-body); color: var(--color-text-secondary); max-width: 56ch; line-height: 22px; }
  code { font-family: var(--font-family-mono); font-size: 13px; background: var(--color-surface); padding: 2px 6px; border-radius: var(--radius-chip); color: var(--color-text-primary); }
</style></head>
<body>
<div class="card stack">
  <div class="display">Tomorrow<span class="cyan">land</span></div>
  <div class="meta-row">
    <span>Inter</span><span>400 · 500 · 600 · 700</span><span>JetBrains Mono</span>
  </div>
  <p class="body">A local-first knowledge intelligence system. Indexes files, email, Confluence and Jira into a private hybrid search workspace with <code>previews</code>, translation, and optional on-prem LLM Q&amp;A.</p>
</div>
</body></html>
