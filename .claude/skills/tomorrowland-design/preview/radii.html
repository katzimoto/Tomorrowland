<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .shape { height: 120px; background: var(--color-surface); border: 1px solid var(--color-border); display: flex; align-items: flex-end; justify-content: flex-start; padding: 12px; }
  .a { border-radius: var(--radius-chip); }
  .b { border-radius: var(--radius-panel); }
  .c { border-radius: var(--radius-pill); }
  .name { font-size: 13px; font-weight: 600; }
  .meta { font-family: var(--font-family-mono); font-size: 11px; color: var(--color-text-muted); }
  .info { display: flex; flex-direction: column; gap: 2px; }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="shape a">
      <div class="info"><div class="name">Chip — 4px</div><div class="meta">badges · selects · segmented toggle</div></div>
    </div>
    <div class="shape b">
      <div class="info"><div class="name">Panel — 6px</div><div class="meta">buttons · cards · inputs · dialogs</div></div>
    </div>
    <div class="shape c" style="border-radius: 999px; padding: 0 24px; height: 56px; align-items: center;">
      <div class="info"><div class="name">Pill — 999px</div><div class="meta">starter prompts · filter chips only</div></div>
    </div>
  </div>
</div>
</body></html>
