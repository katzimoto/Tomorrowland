<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><title>Banner & empty state</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .alert { padding: 12px 14px; background: var(--color-warning-surface); border: 1px solid var(--color-warning-border); border-radius: var(--radius-panel); color: var(--color-warning-text); font-size: 14px; }
  .empty { padding: 32px 24px; border: 1px solid var(--color-border); border-radius: var(--radius-panel); background: var(--color-surface); text-align: left; display: flex; flex-direction: column; gap: 8px; }
  .empty h2 { font-size: 18px; font-weight: 600; margin: 0; color: var(--color-text-primary); }
  .empty p { font-size: 14px; margin: 0; color: var(--color-text-secondary); max-width: 60ch; line-height: 1.55; }
  .empty .btn { align-self: flex-start; margin-top: 8px; padding: 6px 14px; border-radius: var(--radius-panel); background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text-primary); font: inherit; font-size: 14px; cursor: pointer; }
</style></head>
<body>
<div class="card stack">
  <div class="alert">Your session expired. Sign in again.</div>
  <div class="empty">
    <h2>Search unavailable</h2>
    <p>The search backend is not reachable. Check the server and try again.</p>
    <button class="btn">Retry</button>
  </div>
</div>
</body></html>
