x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-prod}
  POSTGRES_URL: ${POSTGRES_URL:-postgresql+psycopg://postgres:changeme@postgres:5432/app}
  KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  FILES_ROOT: ${FILES_ROOT:-/data}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
  LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
  SUPPORTED_TRANSLATION_SOURCE_LANGUAGES: ${SUPPORTED_TRANSLATION_SOURCE_LANGUAGES:-en,he,zh,ko,th,ar,fr,ru,es}
  SUPPORTED_TRANSLATION_TARGET_LANGUAGES: ${SUPPORTED_TRANSLATION_TARGET_LANGUAGES:-en,he,zh,ko,th,ar,fr,ru,es}
  OLLAMA_URL: ${OLLAMA_URL:-http://ollama-llm:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
  OLLAMA_UTILITY_MODEL: ${OLLAMA_UTILITY_MODEL:-qwen3:1.7b}
  OLLAMA_RERANKER_MODEL: ${OLLAMA_RERANKER_MODEL:-}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:8b}
  EMBEDDING_URL: ${EMBEDDING_URL:-http://ollama-embed:11434}
  EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-4096}
  EMBEDDING_PROVIDER_UNSAFE_ALLOW_TEST_IN_PROD: ${EMBEDDING_PROVIDER_UNSAFE_ALLOW_TEST_IN_PROD:-false}
  # External / OpenAI-compatible model provider overrides (optional).
  # Leave LLM_PROVIDER empty to use the bundled Ollama. Set LLM_PROVIDER=litellm
  # (or openai-compatible / openai / llama-cpp) with LLM_BASE_URL + LLM_MODEL to
  # route the api AND every pipeline worker to an external local LLM instead of an
  # Ollama model bundle. LLM_API_KEY / EMBEDDING_API_KEY carry Bearer auth when the
  # endpoint requires it (LiteLLM proxy key, etc.); leave empty for local Ollama.
  LLM_PROVIDER: ${LLM_PROVIDER:-}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_MODEL: ${LLM_MODEL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
  AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
  LDAP_URL: ${LDAP_URL:-ldap://domain-controller:389}
  LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=company,DC=local}
  LDAP_BIND_USER: ${LDAP_BIND_USER:-cn=svc-search,DC=company,DC=local}
  LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-changeme}
  LDAP_GROUP_SEARCH_BASE_DNS: ${LDAP_GROUP_SEARCH_BASE_DNS:-}
  LDAP_GROUP_SEARCH_FILTER: ${LDAP_GROUP_SEARCH_FILTER:-(&(objectClass=group)(cn=*{query}*))}
  LDAP_GROUP_SEARCH_LIMIT: ${LDAP_GROUP_SEARCH_LIMIT:-50}
  LDAP_GROUP_SEARCH_TIMEOUT: ${LDAP_GROUP_SEARCH_TIMEOUT:-10}
  LDAP_GROUP_EXTERNAL_ID_ATTR: ${LDAP_GROUP_EXTERNAL_ID_ATTR:-objectGUID}
  LDAP_GROUP_DISPLAY_NAME_ATTR: ${LDAP_GROUP_DISPLAY_NAME_ATTR:-cn}
  FEATURE_RAG_QA: ${FEATURE_RAG_QA:-true}
  FEATURE_SUMMARIZATION: ${FEATURE_SUMMARIZATION:-true}
  FEATURE_ENTITY_EXTRACTION: ${FEATURE_ENTITY_EXTRACTION:-true}
  FEATURE_ANNOTATIONS: ${FEATURE_ANNOTATIONS:-true}
  FEATURE_SUBSCRIPTIONS: ${FEATURE_SUBSCRIPTIONS:-true}
  FEATURE_EXPERTISE_MAP: ${FEATURE_EXPERTISE_MAP:-true}
  FEATURE_RELATED_DOCS: ${FEATURE_RELATED_DOCS:-true}
  FEATURE_AUTO_TAGGING: ${FEATURE_AUTO_TAGGING:-true}
  AUTO_ENRICH_THRESHOLD: ${AUTO_ENRICH_THRESHOLD:-5}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
  MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-dev-meilisearch-master-key}
  FEATURE_MEILISEARCH_SEARCH: ${FEATURE_MEILISEARCH_SEARCH:-true}
  FEATURE_MEILISEARCH_SHADOW_INDEX: ${FEATURE_MEILISEARCH_SHADOW_INDEX:-true}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://tomorrowland:changeme@rabbitmq:5672/}
  RABBITMQ_ENABLED: ${RABBITMQ_ENABLED:-true}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

services:
  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["alembic", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - files_data:/data
      - ${TOMORROWLAND_FOLDER_SOURCE_HOST_PATH:-./operator-data/folder-source}:${TOMORROWLAND_FOLDER_SOURCE_CONTAINER_PATH:-/sources/folder}:ro

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    restart: unless-stopped
    cpus: ${API_CPUS:-1.00}
    mem_limit: ${API_MEM_LIMIT:-1g}
    mem_reservation: ${API_MEM_RESERVATION:-256m}
    pids_limit: ${API_PIDS_LIMIT:-512}
    environment: *app-environment
    ports:
      - "${BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).close()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  mcp-server:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-mcp-server"]
    restart: unless-stopped
    cpus: ${MCP_SERVER_CPUS:-0.50}
    mem_limit: ${MCP_SERVER_MEM_LIMIT:-256m}
    mem_reservation: ${MCP_SERVER_MEM_RESERVATION:-64m}
    pids_limit: ${MCP_SERVER_PIDS_LIMIT:-256}
    environment:
      TOMORROWLAND_API_URL: ${MCP_API_URL:-http://api:8000}
      TOMORROWLAND_API_KEY: ${TOMORROWLAND_API_KEY:-}
      TOMORROWLAND_API_TIMEOUT: ${TOMORROWLAND_API_TIMEOUT:-30.0}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${MCP_HOST_PORT:-8001}:8001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8001'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    image: ${TOMORROWLAND_FRONTEND_IMAGE:-tomorrowland/frontend:airgap}
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 $$(cat /var/run/nginx.pid)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    cpus: ${POSTGRES_CPUS:-1.00}
    mem_limit: ${POSTGRES_MEM_LIMIT:-1536m}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-512m}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-512}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: redpandadata/redpanda:v24.1.9
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "${BIND_HOST:-127.0.0.1}:${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - kafka_data:/var/lib/redpanda/data

  meilisearch:
    image: getmeili/meilisearch:v1.9
    restart: unless-stopped
    cpus: ${MEILISEARCH_CPUS:-1.00}
    mem_limit: ${MEILISEARCH_MEM_LIMIT:-1g}
    mem_reservation: ${MEILISEARCH_MEM_RESERVATION:-256m}
    pids_limit: ${MEILISEARCH_PIDS_LIMIT:-512}
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-dev-meilisearch-master-key}
      MEILI_ENV: ${MEILISEARCH_ENV:-production}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${MEILISEARCH_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health | grep -q 'available'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
    volumes:
      - meilisearch_data:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    cpus: ${QDRANT_CPUS:-1.00}
    mem_limit: ${QDRANT_MEM_LIMIT:-1536m}
    mem_reservation: ${QDRANT_MEM_RESERVATION:-512m}
    pids_limit: ${QDRANT_PIDS_LIMIT:-512}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - qdrant_data:/qdrant/storage

  libretranslate:
    build:
      context: .
      dockerfile: docker/libretranslate.Dockerfile
    image: ${TOMORROWLAND_LIBRETRANSLATE_IMAGE:-tomorrowland/libretranslate:airgap}
    restart: unless-stopped
    cpus: ${LIBRETRANSLATE_CPUS:-1.00}
    mem_limit: ${LIBRETRANSLATE_MEM_LIMIT:-2g}
    mem_reservation: ${LIBRETRANSLATE_MEM_RESERVATION:-512m}
    pids_limit: ${LIBRETRANSLATE_PIDS_LIMIT:-512}
    environment:
      LT_UPDATE_PACKAGES: "false"
      LT_UPDATE_MODELS: "false"
      LT_LOAD_ONLY: ${LT_LOAD_ONLY:-en,he,zh,ko,th,ar,fr,ru,es}
      ARGOS_CHUNK_TYPE: ${ARGOS_CHUNK_TYPE:-MINISBD}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${LIBRETRANSLATE_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    logging:
      driver: json-file
    volumes:
      - libretranslate_data:/home/libretranslate/.local

  ollama-llm:
    # Bundled LLM/inference runtime. Gated behind the "local-llm" profile so it
    # is opt-in: activate with --profile local-llm or COMPOSE_PROFILES=local-llm.
    # The tomorrowland-airgap.sh wrapper activates the profile automatically when
    # LLM_PROVIDER is empty, and skips it when LLM_PROVIDER is set (external endpoint).
    build:
      context: .
      dockerfile: docker/ollama-llm.Dockerfile
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
        OLLAMA_UTILITY_MODEL: ${OLLAMA_UTILITY_MODEL:-qwen3:1.7b}
        OLLAMA_RERANKER_MODEL: ${OLLAMA_RERANKER_MODEL:-}
    image: ${TOMORROWLAND_OLLAMA_IMAGE:-tomorrowland/ollama-llm:airgap}
    profiles: ["local-llm"]
    restart: unless-stopped
    cpus: ${OLLAMA_CPUS:-2.00}
    mem_limit: ${OLLAMA_MEM_LIMIT:-8g}
    mem_reservation: ${OLLAMA_MEM_RESERVATION:-2g}
    pids_limit: ${OLLAMA_PIDS_LIMIT:-1024}
    environment:
      OLLAMA_MODELS: /root/.ollama/models
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-2048}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-8}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
    volumes:
      - ollama_llm_data:/root/.ollama

  ollama-embed:
    # Bundled embedding runtime. Gated behind the "local-llm" profile alongside
    # ollama-llm. When LLM_PROVIDER is set, use EMBEDDING_URL to point at an
    # external OpenAI-compatible embedding endpoint instead.
    build:
      context: .
      dockerfile: docker/ollama-embed.Dockerfile
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:8b}
    image: ${TOMORROWLAND_OLLAMA_EMBED_IMAGE:-tomorrowland/ollama-embed:airgap}
    profiles: ["local-llm"]
    restart: unless-stopped
    cpus: ${OLLAMA_EMBED_CPUS:-1.00}
    mem_limit: ${OLLAMA_EMBED_MEM_LIMIT:-8g}
    mem_reservation: ${OLLAMA_EMBED_MEM_RESERVATION:-2g}
    pids_limit: ${OLLAMA_EMBED_PIDS_LIMIT:-512}
    environment:
      OLLAMA_MODELS: /root/.ollama/models
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_EMBED_CONTEXT_LENGTH:-8192}
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_NUM_PARALLEL: ${OLLAMA_EMBED_NUM_PARALLEL:-2}
      OLLAMA_MAX_QUEUE: ${OLLAMA_EMBED_MAX_QUEUE:-16}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_EMBED_KEEP_ALIVE:-4h}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${OLLAMA_EMBED_PORT:-11435}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
    volumes:
      - ollama_embed_data:/root/.ollama

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tomorrowland}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${RABBITMQ_PORT:-5672}:5672"
      - "${BIND_HOST:-127.0.0.1}:${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cpus: ${REDIS_CPUS:-0.25}
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    mem_reservation: ${REDIS_MEM_RESERVATION:-64m}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
    volumes:
      - redis_data:/data

  parse-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-parse-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro
      - ${TOMORROWLAND_FOLDER_SOURCE_HOST_PATH:-./operator-data/folder-source}:${TOMORROWLAND_FOLDER_SOURCE_CONTAINER_PATH:-/sources/folder}:ro

  translate-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-translate-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro
      - ${TOMORROWLAND_FOLDER_SOURCE_HOST_PATH:-./operator-data/folder-source}:${TOMORROWLAND_FOLDER_SOURCE_CONTAINER_PATH:-/sources/folder}:ro

  embed-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-embed-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # No depends_on: ollama-embed — the worker calls the embedding provider per
    # job so it must start whether or not local Ollama is running.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  index-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-index-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data

  intelligence-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-intelligence-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # No depends_on: ollama-llm — the worker calls the LLM provider per job so
    # it must start whether or not local Ollama is running.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro
      - ${TOMORROWLAND_FOLDER_SOURCE_HOST_PATH:-./operator-data/folder-source}:${TOMORROWLAND_FOLDER_SOURCE_CONTAINER_PATH:-/sources/folder}:ro

  alert-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-alert-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8086/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  enrich-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    command: ["tomorrowland-enrich-worker"]
    restart: unless-stopped
    cpus: ${WORKER_CPUS:-1.00}
    mem_limit: ${WORKER_MEM_LIMIT:-256m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-64m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8087/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro
      - ${TOMORROWLAND_FOLDER_SOURCE_HOST_PATH:-./operator-data/folder-source}:${TOMORROWLAND_FOLDER_SOURCE_CONTAINER_PATH:-/sources/folder}:ro

  preview-worker:
    build:
      context: .
      dockerfile: docker/preview-worker.Dockerfile
      args:
        TOMORROWLAND_BACKEND_IMAGE: ${TOMORROWLAND_BACKEND_IMAGE:-tomorrowland/backend:airgap}
    image: ${TOMORROWLAND_PREVIEW_WORKER_IMAGE:-tomorrowland/preview-worker:airgap}
    command: ["tomorrowland-preview-worker"]
    restart: unless-stopped
    # LibreOffice conversion is heavier than the other workers — give it more
    # headroom so a large document cannot starve it.
    cpus: ${PREVIEW_WORKER_CPUS:-2.00}
    mem_limit: ${PREVIEW_WORKER_MEM_LIMIT:-1024m}
    mem_reservation: ${PREVIEW_WORKER_MEM_RESERVATION:-256m}
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - files_data:/data

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    logging:
      driver: json-file

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "${BIND_HOST:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    logging:
      driver: json-file

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail/promtail.yml:/etc/promtail/config.yml:ro
    logging:
      driver: json-file

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy
      loki:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging:
      driver: json-file

volumes:
  files_data:
    name: ${TOMORROWLAND_FILES_VOLUME:-tomorrowland_files_data}
  postgres_data:
    name: ${TOMORROWLAND_POSTGRES_VOLUME:-tomorrowland_postgres_data}
  kafka_data:
    name: ${TOMORROWLAND_KAFKA_VOLUME:-tomorrowland_kafka_data}
  qdrant_data:
    name: ${TOMORROWLAND_QDRANT_VOLUME:-tomorrowland_qdrant_data}
  meilisearch_data:
    name: ${TOMORROWLAND_MEILISEARCH_VOLUME:-tomorrowland_meilisearch_data}
  libretranslate_data:
    name: ${TOMORROWLAND_LIBRETRANSLATE_VOLUME:-tomorrowland_libretranslate_data}
  ollama_llm_data:
    name: ${TOMORROWLAND_OLLAMA_LLM_VOLUME:-tomorrowland_ollama_llm_data}
  ollama_embed_data:
    name: ${TOMORROWLAND_OLLAMA_EMBED_VOLUME:-tomorrowland_ollama_embed_data}
  rabbitmq_data:
    name: ${TOMORROWLAND_RABBITMQ_VOLUME:-tomorrowland_rabbitmq_data}
  redis_data:
    name: ${TOMORROWLAND_REDIS_VOLUME:-tomorrowland_redis_data}
  prometheus_data:
    name: ${TOMORROWLAND_PROMETHEUS_VOLUME:-tomorrowland_prometheus_data}
  grafana_data:
    name: ${TOMORROWLAND_GRAFANA_VOLUME:-tomorrowland_grafana_data}
  loki_data:
    name: ${TOMORROWLAND_LOKI_VOLUME:-tomorrowland_loki_data}
